name: Release

on:
  push:
    tags:
      - "mocklm/v*"

env:
  IMAGE_REPO: quay.io/fzdarsky/mocklm

jobs:
  build:
    strategy:
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6

      - name: Log in to quay.io
        run: podman login -u "$QUAY_USERNAME" -p "$QUAY_PASSWORD" quay.io
        env:
          QUAY_USERNAME: ${{ secrets.QUAY_USERNAME }}
          QUAY_PASSWORD: ${{ secrets.QUAY_PASSWORD }}

      - name: Build and push
        run: make -C mocklm build push VERSION="${GITHUB_REF_NAME#mocklm/v}"

  manifest:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Log in to quay.io
        run: podman login -u "$QUAY_USERNAME" -p "$QUAY_PASSWORD" quay.io
        env:
          QUAY_USERNAME: ${{ secrets.QUAY_USERNAME }}
          QUAY_PASSWORD: ${{ secrets.QUAY_PASSWORD }}

      - name: Create and push manifest lists
        run: make -C mocklm manifest VERSION="${GITHUB_REF_NAME#mocklm/v}"
