apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

patches:
  - target:
      kind: Deployment
      name: mocklm
    patch: |
      - op: replace
        path: /spec/replicas
        value: 1
      - op: replace
        path: /spec/template/spec/containers/0/env
        value:
          - name: MOCKLM_MODE
            value: echo
          - name: MOCKLM_CATCH_ALL
            value: "true"
          - name: MOCKLM_MODEL_NAME
            value: mocklm
